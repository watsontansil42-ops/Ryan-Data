<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RYAN Specialty — Valuation Dashboard</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
  :root {
    --bg: #080d13; --card: #0e1620; --card-border: #182536; --surface: #111b28;
    --text: #b8c8db; --text-dim: #56687d; --bold: #e4edf6;
    --accent: #3b9eff; --accent-dim: rgba(59,158,255,0.12); --accent-border: rgba(59,158,255,0.3);
    --green: #22c55e; --green-dim: rgba(34,197,94,0.12);
    --red: #ef4444; --red-dim: rgba(239,68,68,0.12);
    --amber: #f59e0b; --purple: #a78bfa; --purple-dim: rgba(167,139,250,0.12);
    --input-bg: #0a1018;
    --mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
    --sans: 'IBM Plex Sans', -apple-system, sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 14px; }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.5; }
  .wrap { max-width: 920px; margin: 0 auto; padding: 24px 20px 40px; }

  .header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid var(--card-border); padding-bottom: 18px; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
  .ticker { font-family: var(--mono); font-size: 2rem; font-weight: 700; color: var(--bold); letter-spacing: 3px; line-height: 1; }
  .co-name { font-size: 0.82rem; color: var(--text-dim); margin-top: 3px; }
  .price-box { text-align: right; }
  .price-tag { font-family: var(--mono); font-size: 0.65rem; color: var(--text-dim); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 2px; }
  .price-val { font-family: var(--mono); font-size: 2.2rem; font-weight: 700; color: var(--green); line-height: 1.1; }
  .price-val.stale { color: var(--amber); }
  .price-change { font-family: var(--mono); font-size: 0.78rem; margin-top: 2px; }
  .price-change.up { color: var(--green); } .price-change.down { color: var(--red); }
  .price-ts { font-size: 0.68rem; color: var(--text-dim); margin-top: 1px; font-family: var(--mono); }
  .status-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 5px; position: relative; top: -1px; }
  .status-dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .status-dot.off { background: var(--text-dim); }

  .controls { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
  .toggle-group { display: flex; background: var(--input-bg); border: 1px solid var(--card-border); border-radius: 6px; overflow: hidden; }
  .toggle-btn { background: none; border: none; color: var(--text-dim); font-family: var(--mono); font-size: 0.75rem; padding: 6px 14px; cursor: pointer; transition: all 0.15s; }
  .toggle-btn.active { background: var(--accent-dim); color: var(--accent); }
  .manual-wrap { display: flex; align-items: center; background: var(--input-bg); border: 1px solid var(--card-border); border-radius: 6px; padding: 0 10px; }
  .manual-wrap span { color: var(--text-dim); font-family: var(--mono); font-size: 0.85rem; }
  .manual-wrap input { background: none; border: none; color: var(--bold); font-family: var(--mono); font-size: 0.85rem; padding: 6px 4px; width: 90px; outline: none; }
  .btn-sm { background: none; border: 1px solid var(--card-border); color: var(--text-dim); font-family: var(--mono); font-size: 0.72rem; padding: 5px 12px; border-radius: 5px; cursor: pointer; transition: all 0.15s; }
  .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
  .btn-accent { background: var(--accent); border: none; color: #fff; font-family: var(--mono); font-size: 0.75rem; font-weight: 600; padding: 6px 14px; border-radius: 5px; cursor: pointer; }
  .warning { font-size: 0.75rem; color: var(--amber); font-style: italic; }

  .card { background: var(--card); border: 1px solid var(--card-border); border-radius: 10px; overflow: hidden; margin-bottom: 18px; }
  .card-head { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; border-bottom: 1px solid var(--card-border); flex-wrap: wrap; gap: 8px; }
  .card-title { font-weight: 600; color: var(--bold); font-size: 0.95rem; }
  .card-period { color: var(--accent); font-family: var(--mono); font-size: 0.8rem; }
  .card-actions { display: flex; gap: 6px; }
  .btn-edit { background: var(--accent-dim); border: none; color: var(--accent); font-family: var(--mono); font-size: 0.72rem; padding: 4px 10px; border-radius: 4px; cursor: pointer; }
  .btn-del { background: var(--red-dim); border: none; color: var(--red); font-family: var(--mono); font-size: 0.72rem; padding: 4px 10px; border-radius: 4px; cursor: pointer; }

  .period-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
  .tabs { display: flex; gap: 4px; flex-wrap: wrap; }
  .tab { background: var(--input-bg); border: 1px solid var(--card-border); color: var(--text-dim); font-family: var(--mono); font-size: 0.72rem; padding: 5px 12px; border-radius: 4px; cursor: pointer; transition: all 0.15s; }
  .tab.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent-border); }
  .tab-add { border-style: dashed; }

  table { width: 100%; border-collapse: collapse; }
  .row td { padding: 7px 20px; font-family: var(--mono); font-size: 0.82rem; border-bottom: 1px solid rgba(24,37,54,0.5); }
  .row td:last-child { text-align: right; }
  .row.indent td:first-child { padding-left: 40px; }
  .row.bold td { font-weight: 700; color: var(--bold); }
  .row.accent td { color: var(--accent); font-weight: 700; }
  .row.large td { font-size: 1rem; }
  .row.spacer td { height: 10px; border: none; }
  .row input[type="number"] { background: var(--input-bg); border: 1px solid var(--accent-border); color: var(--bold); font-family: var(--mono); font-size: 0.82rem; padding: 3px 6px; border-radius: 4px; width: 100px; text-align: right; outline: none; }

  .multiples { display: flex; border-top: 2px dashed var(--card-border); }
  .mult-card { flex: 1; padding: 18px 20px; text-align: center; }
  .mult-card + .mult-card { border-left: 1px solid var(--card-border); }
  .mult-label { font-size: 0.68rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; font-family: var(--mono); margin-bottom: 6px; }
  .mult-val { font-family: var(--mono); font-size: 1.8rem; font-weight: 700; color: var(--accent); }
  .mult-formula { font-size: 0.65rem; color: var(--text-dim); font-family: var(--mono); margin-top: 3px; }

  .comp-scroll { overflow-x: auto; }
  .comp-table { width: 100%; border-collapse: collapse; }
  .comp-table th { padding: 8px 16px; text-align: right; color: var(--accent); font-family: var(--mono); font-size: 0.72rem; font-weight: 600; border-bottom: 1px solid var(--card-border); }
  .comp-table th:first-child { text-align: left; }
  .comp-table td { padding: 6px 16px; font-family: var(--mono); font-size: 0.78rem; text-align: right; border-bottom: 1px solid rgba(24,37,54,0.3); }
  .comp-table td:first-child { text-align: left; color: var(--text-dim); white-space: nowrap; }

  .form-card { background: var(--card); border: 1px solid var(--accent-border); border-radius: 10px; padding: 20px; margin-bottom: 18px; }
  .form-title { font-weight: 600; color: var(--bold); font-size: 0.95rem; margin-bottom: 14px; }
  .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; margin-bottom: 14px; }
  .form-field label { display: block; font-family: var(--mono); font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
  .form-field input { width: 100%; background: var(--input-bg); border: 1px solid var(--card-border); color: var(--bold); font-family: var(--mono); font-size: 0.82rem; padding: 7px 10px; border-radius: 5px; outline: none; }
  .form-actions { display: flex; gap: 8px; }
  .btn-cancel { background: none; border: 1px solid var(--card-border); color: var(--text-dim); font-family: var(--mono); font-size: 0.75rem; padding: 6px 14px; border-radius: 5px; cursor: pointer; }

  .share-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 18px; padding: 10px 16px; background: var(--surface); border: 1px solid var(--card-border); border-radius: 8px; flex-wrap: wrap; }
  .share-bar .label { font-family: var(--mono); font-size: 0.72rem; color: var(--text-dim); white-space: nowrap; }
  .share-url { flex: 1; min-width: 200px; background: var(--input-bg); border: 1px solid var(--card-border); color: var(--text); font-family: var(--mono); font-size: 0.72rem; padding: 6px 10px; border-radius: 4px; outline: none; }
  .copied-toast { font-family: var(--mono); font-size: 0.72rem; color: var(--green); opacity: 0; transition: opacity 0.3s; }
  .copied-toast.show { opacity: 1; }

  /* Charts */
  .chart-filters { display: flex; gap: 4px; flex-wrap: wrap; }
  .chart-filter-btn { background: var(--input-bg); border: 1px solid var(--card-border); color: var(--text-dim); font-family: var(--mono); font-size: 0.7rem; padding: 4px 10px; border-radius: 4px; cursor: pointer; transition: all 0.15s; }
  .chart-filter-btn.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent-border); }
  .chart-filter-btn.active-blue { background: var(--accent-dim); color: var(--accent); border-color: var(--accent-border); }
  .chart-filter-btn.active-purple { background: var(--purple-dim); color: var(--purple); border-color: rgba(167,139,250,0.3); }
  .chart-filter-btn:hover { border-color: var(--accent-border); color: var(--text); }
  .chart-wrap { padding: 16px 20px 20px; }
  .chart-container { position: relative; height: 320px; }
  .chart-loading { display: flex; align-items: center; justify-content: center; height: 320px; color: var(--text-dim); font-family: var(--mono); font-size: 0.8rem; }
  .chart-stats { display: flex; gap: 20px; padding: 12px 20px; border-top: 1px solid var(--card-border); font-family: var(--mono); font-size: 0.72rem; flex-wrap: wrap; }
  .chart-stat-label { color: var(--text-dim); margin-right: 4px; }
  .chart-stat-val { color: var(--bold); font-weight: 600; }
  .chart-stat-val.up { color: var(--green); } .chart-stat-val.down { color: var(--red); }
  .mult-toggles { display: flex; gap: 4px; align-items: center; }
  .mult-toggle-label { font-family: var(--mono); font-size: 0.68rem; color: var(--text-dim); margin-right: 4px; }

  .footer { text-align: center; color: var(--text-dim); font-family: var(--mono); font-size: 0.65rem; padding: 16px 0; letter-spacing: 0.5px; }

  @media (max-width: 600px) {
    .wrap { padding: 16px 12px 32px; } .ticker { font-size: 1.5rem; } .price-val { font-size: 1.6rem; }
    .mult-val { font-size: 1.3rem; } .multiples { flex-direction: column; }
    .mult-card + .mult-card { border-left: none; border-top: 1px solid var(--card-border); }
    .chart-container { height: 240px; }
  }
  /* Password Gate */
  .pw-gate {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; background: var(--bg);
  }
  .pw-box {
    background: var(--card); border: 1px solid var(--card-border); border-radius: 12px;
    padding: 40px; text-align: center; width: 340px; max-width: 90vw;
  }
  .pw-ticker { font-family: var(--mono); font-size: 1.6rem; font-weight: 700; color: var(--bold); letter-spacing: 3px; margin-bottom: 4px; }
  .pw-sub { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 24px; }
  .pw-input {
    width: 100%; background: var(--input-bg); border: 1px solid var(--card-border);
    color: var(--bold); font-family: var(--mono); font-size: 0.9rem;
    padding: 10px 14px; border-radius: 6px; outline: none; text-align: center;
    margin-bottom: 12px;
  }
  .pw-input:focus { border-color: var(--accent-border); }
  .pw-btn {
    width: 100%; background: var(--accent); border: none; color: #fff;
    font-family: var(--mono); font-size: 0.82rem; font-weight: 600;
    padding: 10px; border-radius: 6px; cursor: pointer;
  }
  .pw-error { color: var(--red); font-family: var(--mono); font-size: 0.75rem; margin-top: 10px; }
</style>
</head>
<body>
<div id="pwGate" class="pw-gate">
  <div class="pw-box">
    <div class="pw-ticker">RYAN</div>
    <div class="pw-sub">Valuation Dashboard</div>
    <input class="pw-input" id="pwInput" type="password" placeholder="Enter password" onkeydown="if(event.key==='Enter')checkPw()">
    <button class="pw-btn" onclick="checkPw()">Access Dashboard</button>
    <div class="pw-error" id="pwError" style="display:none">Incorrect password</div>
  </div>
</div>
<div class="wrap" id="app" style="display:none"></div>

<script>
// ── Default Data: 4 Quarterly Periods ──
const DEFAULT_PERIODS = [
  { id:"ltm-mar25", label:"LTM Mar-25", effectiveDate:"2025-05-07", ebitda:665.2, changeContingent:-36.8, totalAdjustments:226.1, creditAdjustments:77.9, sharesOutstanding:262, cash:213, totalDebt:3689 },
  { id:"ltm-jun25", label:"LTM Jun-25", effectiveDate:"2025-08-07", ebitda:733.2, changeContingent:-38.9, totalAdjustments:220.9, creditAdjustments:41.0, sharesOutstanding:262, cash:0, totalDebt:3299 },
  { id:"ltm-sep25", label:"LTM Sep-25", effectiveDate:"2025-11-07", ebitda:812.4, changeContingent:-26.5, totalAdjustments:174.6, creditAdjustments:26.0, sharesOutstanding:264, cash:157, totalDebt:3392 },
  { id:"ltm-dec25", label:"LTM Dec-25", effectiveDate:"2026-02-20", ebitda:803.1, changeContingent:13.1, totalAdjustments:150.5, creditAdjustments:35.5, sharesOutstanding:264, cash:158, totalDebt:3352 },
];

let STATE = { periods: [...DEFAULT_PERIODS], activePeriodIdx: 3, manualPrice: null, useManualPrice: false };

let livePrice=null, prevClose=null, priceLoading=true, priceError=false, lastFetch=null;
let editing=false, showAddForm=false, copiedShow=false;

// Chart state
let priceChart=null, multChart=null;
let chartRange="1y", chartLoading=false, chartData=[];
let multChartLoading=false, multChartData=[];
let showAdjLine=true, showCreditLine=true;

const CHART_RANGES = [
  {key:"1w",label:"1W",range:"5d",interval:"15m"},{key:"1m",label:"1M",range:"1mo",interval:"1d"},
  {key:"3m",label:"3M",range:"3mo",interval:"1d"},{key:"ytd",label:"YTD",range:"ytd",interval:"1d"},
  {key:"1y",label:"1Y",range:"1y",interval:"1d"},{key:"5y",label:"5Y",range:"5y",interval:"1wk"},
  {key:"ipo",label:"Since IPO",range:"max",interval:"1wk"},
];

// ── Helpers ──
const fmt=(n,d=1)=>n==null||isNaN(n)?"—":n.toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtM=n=>"$"+fmt(n);
const fmtX=n=>fmt(n,1)+"x";
const fmtComma=n=>n==null||isNaN(n)?"—":"$"+Math.round(n).toLocaleString("en-US");

function calcDerived(p, price) {
  const ebitdac=(p.ebitda||0)+(p.changeContingent||0);
  const adjEbitdac=ebitdac+(p.totalAdjustments||0);
  const pfAdjEbitdac=adjEbitdac+(p.creditAdjustments||0);
  const equityValue=(p.sharesOutstanding||0)*(price||0);
  const netDebt=(p.totalDebt||0)-(p.cash||0);
  const ev=equityValue+netDebt;
  const adjMultiple=adjEbitdac>0?ev/adjEbitdac:null;
  const creditMultiple=pfAdjEbitdac>0?ev/pfAdjEbitdac:null;
  return {ebitdac,adjEbitdac,pfAdjEbitdac,equityValue,netDebt,ev,adjMultiple,creditMultiple};
}

// Find active period for a given date
function getActivePeriodForDate(dateMs) {
  const sorted = [...STATE.periods].filter(p=>p.effectiveDate).sort((a,b)=>new Date(a.effectiveDate)-new Date(b.effectiveDate));
  let active = sorted[0]; // fallback to earliest
  for (const p of sorted) {
    if (new Date(p.effectiveDate).getTime() <= dateMs) active = p;
    else break;
  }
  return active;
}

// ── URL Hash State ──
function encodeState(){try{return btoa(unescape(encodeURIComponent(JSON.stringify({p:STATE.periods,mp:STATE.manualPrice,um:STATE.useManualPrice}))));}catch{return "";}}
function decodeState(hash){try{const j=decodeURIComponent(escape(atob(hash)));const d=JSON.parse(j);if(d.p&&Array.isArray(d.p)){STATE.periods=d.p;STATE.manualPrice=d.mp||null;STATE.useManualPrice=!!d.um;}}catch{}}
function pushState(){history.replaceState(null,"","#"+encodeState());try{localStorage.setItem("ryan-val-v4",JSON.stringify(STATE));}catch{}}
function loadState(){const h=location.hash.slice(1);if(h){decodeState(h);}else{try{const s=localStorage.getItem("ryan-val-v4");if(s){const d=JSON.parse(s);if(d.periods)STATE={...STATE,...d};}}catch{}}}

// ── Price Fetching ──
async function fetchPrice(){
  priceLoading=true; render();
  try{
    const r=await fetch("/.netlify/functions/price?symbol=RYAN");
    if(!r.ok)throw new Error(r.status);
    const d=await r.json(); if(d.error)throw new Error(d.error);
    if(d.price&&!isNaN(d.price)){livePrice=d.price;prevClose=d.prevClose||null;priceError=false;lastFetch=new Date();}
    else throw new Error("No price");
  }catch(e){console.error(e);priceError=true;}
  priceLoading=false; render();
}

async function fetchChartData(rangeKey){
  chartRange=rangeKey; chartLoading=true; render();
  const cfg=CHART_RANGES.find(r=>r.key===rangeKey);
  try{
    const r=await fetch(`/.netlify/functions/price?symbol=RYAN&range=${cfg.range}&interval=${cfg.interval}`);
    const d=await r.json(); if(d.chart&&d.chart.length>0)chartData=d.chart;
  }catch(e){console.error(e);}
  chartLoading=false; render(); renderPriceChart();
}

async function fetchMultChartData(){
  multChartLoading=true; render();
  try{
    const r=await fetch("/.netlify/functions/price?symbol=RYAN&range=1y&interval=1d");
    const d=await r.json(); if(d.chart&&d.chart.length>0)multChartData=d.chart;
  }catch(e){console.error(e);}
  multChartLoading=false; render(); renderMultChart();
}

function getActivePrice(){
  if(STATE.useManualPrice&&STATE.manualPrice!=null)return STATE.manualPrice;
  return livePrice||STATE.manualPrice||41.30;
}

// ── Price Chart ──
function renderPriceChart(){
  const canvas=document.getElementById("priceChartCanvas");
  if(!canvas||chartData.length===0)return;
  if(priceChart){priceChart.destroy();priceChart=null;}
  const ctx=canvas.getContext("2d");
  const grad=ctx.createLinearGradient(0,0,0,canvas.parentElement.clientHeight);
  const first=chartData[0].c,last=chartData[chartData.length-1].c,isUp=last>=first;
  grad.addColorStop(0,isUp?"rgba(34,197,94,0.18)":"rgba(239,68,68,0.18)");
  grad.addColorStop(1,isUp?"rgba(34,197,94,0.0)":"rgba(239,68,68,0.0)");
  priceChart=new Chart(ctx,{
    type:"line",
    data:{labels:chartData.map(d=>new Date(d.t)),datasets:[{data:chartData.map(d=>d.c),borderColor:isUp?"#22c55e":"#ef4444",borderWidth:1.8,backgroundColor:grad,fill:true,pointRadius:0,pointHitRadius:8,tension:0.1}]},
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:"index",intersect:false},
      plugins:{legend:{display:false},tooltip:{backgroundColor:"#182536",titleColor:"#b8c8db",bodyColor:"#e4edf6",titleFont:{family:"'JetBrains Mono'",size:11},bodyFont:{family:"'JetBrains Mono'",size:13,weight:"bold"},borderColor:"#2a3f57",borderWidth:1,padding:10,displayColors:false,
        callbacks:{title(i){return new Date(i[0].parsed.x).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});},label(i){return "$"+i.parsed.y.toFixed(2);}}}},
      scales:{x:{type:"time",grid:{color:"rgba(24,37,54,0.5)",drawBorder:false},ticks:{color:"#56687d",font:{family:"'JetBrains Mono'",size:10},maxTicksLimit:8},border:{display:false}},
        y:{position:"right",grid:{color:"rgba(24,37,54,0.5)",drawBorder:false},ticks:{color:"#56687d",font:{family:"'JetBrains Mono'",size:10},callback(v){return "$"+v.toFixed(0);}},border:{display:false}}}}
  });
}

// ── Multiple Tracker Chart ──
function renderMultChart(){
  const canvas=document.getElementById("multChartCanvas");
  if(!canvas||multChartData.length===0)return;
  if(multChart){multChart.destroy();multChart=null;}
  const ctx=canvas.getContext("2d");

  // Build daily multiple data
  const adjPoints=[], creditPoints=[], metaArr=[];
  for(const pt of multChartData){
    const per=getActivePeriodForDate(pt.t);
    if(!per)continue;
    const d=calcDerived(per,pt.c);
    adjPoints.push({x:new Date(pt.t),y:d.adjMultiple?Math.round(d.adjMultiple*10)/10:null});
    creditPoints.push({x:new Date(pt.t),y:d.creditMultiple?Math.round(d.creditMultiple*10)/10:null});
    metaArr.push({price:pt.c,ev:d.ev,adjEbitdac:d.adjEbitdac,pfAdjEbitdac:d.pfAdjEbitdac,period:per.label,ebitda:per.ebitda});
  }

  const datasets=[];
  if(showAdjLine){
    datasets.push({label:"Adj. EBITDAC Multiple",data:adjPoints,borderColor:"#3b9eff",borderWidth:2,backgroundColor:"rgba(59,158,255,0.05)",fill:false,pointRadius:0,pointHitRadius:8,tension:0.15});
  }
  if(showCreditLine){
    datasets.push({label:"Credit Adj. Multiple",data:creditPoints,borderColor:"#a78bfa",borderWidth:2,backgroundColor:"rgba(167,139,250,0.05)",fill:false,pointRadius:0,pointHitRadius:8,tension:0.15,borderDash:[4,3]});
  }

  // Vertical lines for period transitions
  const periodLines=STATE.periods.filter(p=>p.effectiveDate).map(p=>({date:new Date(p.effectiveDate),label:p.label}));
  const annotation_plugin={id:'periodLines',afterDraw(chart){
    const xScale=chart.scales.x,yScale=chart.scales.y;
    const ctx2=chart.ctx;
    ctx2.save();
    for(const pl of periodLines){
      const x=xScale.getPixelForValue(pl.date);
      if(x>=xScale.left&&x<=xScale.right){
        ctx2.beginPath();ctx2.setLineDash([3,3]);ctx2.strokeStyle="rgba(86,104,125,0.5)";ctx2.lineWidth=1;
        ctx2.moveTo(x,yScale.top);ctx2.lineTo(x,yScale.bottom);ctx2.stroke();ctx2.setLineDash([]);
        ctx2.font="10px 'JetBrains Mono'";ctx2.fillStyle="#56687d";ctx2.textAlign="center";
        ctx2.fillText(pl.label,x,yScale.top-6);
      }
    }
    ctx2.restore();
  }};

  multChart=new Chart(ctx,{
    type:"line",
    data:{datasets},
    plugins:[annotation_plugin],
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:"index",intersect:false},
      plugins:{legend:{display:false},
        tooltip:{backgroundColor:"#182536",titleColor:"#b8c8db",bodyColor:"#e4edf6",
          titleFont:{family:"'JetBrains Mono'",size:11},bodyFont:{family:"'JetBrains Mono'",size:12},
          borderColor:"#2a3f57",borderWidth:1,padding:12,displayColors:true,boxWidth:8,boxHeight:2,
          callbacks:{
            title(items){
              const idx=items[0].dataIndex;
              const d=new Date(multChartData[idx]?.t);
              return d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric",year:"numeric"});
            },
            afterTitle(items){
              const idx=items[0].dataIndex;
              const m=metaArr[idx];
              if(!m)return "";
              return "Period: "+m.period;
            },
            beforeBody(items){
              const idx=items[0].dataIndex;
              const m=metaArr[idx];
              if(!m)return [];
              return [
                "Share Price: $"+m.price.toFixed(2),
                "Enterprise Value: $"+Math.round(m.ev).toLocaleString(),
                "EBITDA: $"+m.ebitda.toFixed(1),
              ];
            },
            label(item){
              return " "+item.dataset.label+": "+item.parsed.y.toFixed(1)+"x";
            }
          }
        }
      },
      scales:{
        x:{type:"time",grid:{color:"rgba(24,37,54,0.5)",drawBorder:false},ticks:{color:"#56687d",font:{family:"'JetBrains Mono'",size:10},maxTicksLimit:8},border:{display:false}},
        y:{position:"right",grid:{color:"rgba(24,37,54,0.5)",drawBorder:false},ticks:{color:"#56687d",font:{family:"'JetBrains Mono'",size:10},callback(v){return v.toFixed(0)+"x";}},border:{display:false}}
      }
    }
  });
}

// ── Render ──
function render(){
  const ap=STATE.periods[STATE.activePeriodIdx]||STATE.periods[0];
  const price=getActivePrice();
  const d=ap?calcDerived(ap,price):null;
  const isLive=!STATE.useManualPrice&&livePrice!=null;
  const priceLabel=STATE.useManualPrice?"MANUAL PRICE":priceLoading&&!livePrice?"FETCHING...":priceError&&!livePrice?"MANUAL FALLBACK":"LIVE PRICE";
  const priceClass=isLive?"":"stale";

  let changeHtml="";
  if(isLive&&prevClose&&livePrice){const chg=livePrice-prevClose,pct=(chg/prevClose)*100,dir=chg>=0?"up":"down",sign=chg>=0?"+":"";changeHtml=`<div class="price-change ${dir}">${sign}${chg.toFixed(2)} (${sign}${pct.toFixed(2)}%)</div>`;}

  let html=`
    <div class="header">
      <div><div class="ticker">RYAN</div><div class="co-name">Ryan Specialty Holdings, Inc.</div></div>
      <div class="price-box">
        <div class="price-tag"><span class="status-dot ${isLive?'live':'off'}"></span>${priceLabel}</div>
        <div class="price-val ${priceClass}">$${fmt(price,2)}</div>
        ${changeHtml}
        ${lastFetch&&!STATE.useManualPrice?`<div class="price-ts">Updated ${lastFetch.toLocaleTimeString()}</div>`:""}
      </div>
    </div>

    <!-- Multiple Tracker -->
    <div class="card">
      <div class="card-head">
        <span class="card-title">Daily Multiple Tracker</span>
        <div class="mult-toggles">
          <button class="chart-filter-btn ${showAdjLine?'active-blue':''}" onclick="toggleMultLine('adj')">Adj. EBITDAC</button>
          <button class="chart-filter-btn ${showCreditLine?'active-purple':''}" onclick="toggleMultLine('credit')">PF Adj. EBITDAC</button>
        </div>
      </div>
      <div class="chart-wrap">
        ${multChartLoading?'<div class="chart-loading">Loading multiple data...</div>':`<div class="chart-container"><canvas id="multChartCanvas"></canvas></div>`}
      </div>
    </div>

    <!-- Share Price Chart -->
    <div class="card">
      <div class="card-head">
        <span class="card-title">Share Price</span>
        <div class="chart-filters">
          ${CHART_RANGES.map(r=>`<button class="chart-filter-btn ${chartRange===r.key?'active':''}" onclick="fetchChartData('${r.key}')">${r.label}</button>`).join("")}
        </div>
      </div>
      <div class="chart-wrap">
        ${chartLoading?'<div class="chart-loading">Loading chart data...</div>':`<div class="chart-container"><canvas id="priceChartCanvas"></canvas></div>`}
      </div>
    </div>

    <div class="share-bar">
      <span class="label">Share with team →</span>
      <input class="share-url" readonly value="${location.origin+location.pathname+'#'+encodeState()}" onclick="this.select()">
      <button class="btn-sm" onclick="copyUrl()">Copy Link</button>
      <span class="copied-toast ${copiedShow?'show':''}" id="copiedToast">Copied!</span>
    </div>

    <div class="controls">
      <div class="toggle-group">
        <button class="toggle-btn ${!STATE.useManualPrice?'active':''}" onclick="setManualMode(false)">Live Price</button>
        <button class="toggle-btn ${STATE.useManualPrice?'active':''}" onclick="setManualMode(true)">Manual</button>
      </div>
      ${STATE.useManualPrice||(priceError&&!livePrice)?`<div class="manual-wrap"><span>$</span><input type="number" step="0.01" value="${STATE.manualPrice||''}" placeholder="Price" oninput="updateManualPrice(this.value)"></div>`:""}
      ${!STATE.useManualPrice?`<button class="btn-sm" onclick="fetchPrice()">↻ Refresh</button>`:""}
      ${priceError&&!STATE.useManualPrice&&!livePrice?`<span class="warning">Live unavailable — enter manually</span>`:""}
    </div>

    <div class="period-bar">
      <div class="tabs">${STATE.periods.map((p,i)=>`<button class="tab ${i===STATE.activePeriodIdx?'active':''}" onclick="selectPeriod(${i})">${p.label}</button>`).join("")}</div>
      <button class="tab tab-add" onclick="toggleAddForm()">+ Add Period</button>
    </div>`;

  if(showAddForm){
    html+=`<div class="form-card"><div class="form-title">Add New Period ($ in millions)</div><div class="form-grid">
      <div class="form-field"><label>Period Label</label><input id="f_label" placeholder="e.g. LTM Mar-26"></div>
      <div class="form-field"><label>Effective Date</label><input id="f_date" type="date"></div>
      <div class="form-field"><label>EBITDA</label><input id="f_ebitda" type="number" step="0.1"></div>
      <div class="form-field"><label>Δ Contingent Consideration</label><input id="f_cc" type="number" step="0.1"></div>
      <div class="form-field"><label>Total Adjustments</label><input id="f_adj" type="number" step="0.1"></div>
      <div class="form-field"><label>Credit Adjustments</label><input id="f_cred" type="number" step="0.1"></div>
      <div class="form-field"><label>Shares Outstanding</label><input id="f_shares" type="number" step="0.1"></div>
      <div class="form-field"><label>Cash</label><input id="f_cash" type="number" step="0.1"></div>
      <div class="form-field"><label>LT + ST Debt</label><input id="f_debt" type="number" step="0.1"></div>
    </div><div class="form-actions"><button class="btn-accent" onclick="addPeriod()">Add Period</button><button class="btn-cancel" onclick="toggleAddForm()">Cancel</button></div></div>`;
  }

  if(ap&&d){
    const ef=editing;
    const mkRow=(label,val,opts={})=>{const cls=["row"];if(opts.indent)cls.push("indent");if(opts.bold)cls.push("bold");if(opts.accent)cls.push("accent");if(opts.large)cls.push("large");if(opts.spacer)return'<tr class="row spacer"><td colspan="2"></td></tr>';const cell=ef&&opts.field?`<input type="number" step="0.1" value="${ap[opts.field]||''}" oninput="updateField('${opts.field}',this.value)">`:val;return`<tr class="${cls.join(' ')}"><td>${label}</td><td>${cell}</td></tr>`;};

    html+=`<div class="card"><div class="card-head"><span class="card-title">Valuation Summary</span><span class="card-period">${ap.label}</span>
      <div class="card-actions"><button class="btn-edit" onclick="toggleEdit()">${editing?'Done':'Edit'}</button>${STATE.periods.length>1?'<button class="btn-del" onclick="deletePeriod()">Delete</button>':""}</div></div>
      <table>
        ${mkRow("EBITDA",fmtM(ap.ebitda),{field:"ebitda"})}
        ${mkRow("(+) Change in Contingent Consideration",fmtM(ap.changeContingent),{indent:true,field:"changeContingent"})}
        ${mkRow("EBITDAC",fmtM(d.ebitdac),{bold:true})}
        ${mkRow("Total Adjustments",fmtM(ap.totalAdjustments),{indent:true,field:"totalAdjustments"})}
        ${mkRow("Adjusted EBITDAC",fmtM(d.adjEbitdac),{bold:true,accent:true})}
        ${mkRow("(+) Credit Adjustments",fmtM(ap.creditAdjustments),{indent:true,field:"creditAdjustments"})}
        ${mkRow("PF Adjusted EBITDAC",fmtM(d.pfAdjEbitdac),{bold:true,accent:true})}
        ${mkRow("","",{spacer:true})}
        ${mkRow("Total Shares Outstanding",fmt(ap.sharesOutstanding,0),{field:"sharesOutstanding"})}
        ${mkRow("Share Price ("+(STATE.useManualPrice?"Manual":"Live")+")","$"+fmt(price,2))}
        ${mkRow("Equity Value",fmtM(d.equityValue),{bold:true})}
        ${mkRow("","",{spacer:true})}
        ${mkRow("Cash",fmtM(ap.cash),{indent:true,field:"cash"})}
        ${mkRow("Long Term Debt + ST Debt",fmtM(ap.totalDebt),{indent:true,field:"totalDebt"})}
        ${mkRow("Net Debt",fmtM(d.netDebt),{bold:true})}
        ${mkRow("","",{spacer:true})}
        ${mkRow("Enterprise Value",fmtM(d.ev),{bold:true,accent:true,large:true})}
      </table>
      <div class="multiples">
        <div class="mult-card"><div class="mult-label">Adjusted EBITDAC Multiple</div><div class="mult-val">${d.adjMultiple?fmtX(d.adjMultiple):"—"}</div><div class="mult-formula">EV / Adj. EBITDAC</div></div>
        <div class="mult-card"><div class="mult-label">Credit Adj. EBITDAC Multiple</div><div class="mult-val">${d.creditMultiple?fmtX(d.creditMultiple):"—"}</div><div class="mult-formula">EV / PF Adj. EBITDAC</div></div>
      </div>
    </div>`;
  }

  if(STATE.periods.length>1){
    const metrics=[{label:"EBITDAC",fn:p=>calcDerived(p,price).ebitdac},{label:"Adj. EBITDAC",fn:p=>calcDerived(p,price).adjEbitdac},{label:"PF Adj. EBITDAC",fn:p=>calcDerived(p,price).pfAdjEbitdac},{label:"Net Debt",fn:p=>calcDerived(p,price).netDebt},{label:"Enterprise Value",fn:p=>calcDerived(p,price).ev},{label:"Adj. Multiple",fn:p=>calcDerived(p,price).adjMultiple,isX:true},{label:"Credit Adj. Multiple",fn:p=>calcDerived(p,price).creditMultiple,isX:true}];
    html+=`<div class="card"><div class="card-head"><span class="card-title">Period Comparison</span></div><div class="comp-scroll"><table class="comp-table">
      <thead><tr><th></th>${STATE.periods.map(p=>`<th>${p.label}</th>`).join("")}</tr></thead><tbody>
      ${metrics.map(m=>`<tr><td>${m.label}</td>${STATE.periods.map(p=>{const v=m.fn(p);return`<td>${m.isX?(v?fmtX(v):"—"):fmtM(v)}</td>`;}).join("")}</tr>`).join("")}
      </tbody></table></div></div>`;
  }

  html+='<div class="footer">Amounts in millions unless noted · Share the URL to sync data across your team · Auto-refreshes every 5 min</div>';
  document.getElementById("app").innerHTML=html;

  if(!chartLoading&&chartData.length>0)setTimeout(renderPriceChart,10);
  if(!multChartLoading&&multChartData.length>0)setTimeout(renderMultChart,10);
}

// ── Actions ──
function setManualMode(m){STATE.useManualPrice=m;pushState();render();}
function updateManualPrice(v){STATE.manualPrice=parseFloat(v)||null;pushState();render();}
function selectPeriod(i){STATE.activePeriodIdx=i;render();}
function toggleEdit(){editing=!editing;render();}
function toggleAddForm(){showAddForm=!showAddForm;render();}
function updateField(field,val){STATE.periods[STATE.activePeriodIdx][field]=parseFloat(val)||0;pushState();render();}
function deletePeriod(){if(STATE.periods.length<=1)return;STATE.periods.splice(STATE.activePeriodIdx,1);STATE.activePeriodIdx=0;pushState();render();}
function addPeriod(){
  const label=document.getElementById("f_label")?.value?.trim();if(!label)return;
  STATE.periods.push({
    id:label.toLowerCase().replace(/\s+/g,"-")+"-"+Date.now(), label,
    effectiveDate:document.getElementById("f_date")?.value||"",
    ebitda:parseFloat(document.getElementById("f_ebitda")?.value)||0,
    changeContingent:parseFloat(document.getElementById("f_cc")?.value)||0,
    totalAdjustments:parseFloat(document.getElementById("f_adj")?.value)||0,
    creditAdjustments:parseFloat(document.getElementById("f_cred")?.value)||0,
    sharesOutstanding:parseFloat(document.getElementById("f_shares")?.value)||0,
    cash:parseFloat(document.getElementById("f_cash")?.value)||0,
    totalDebt:parseFloat(document.getElementById("f_debt")?.value)||0,
  });
  STATE.activePeriodIdx=STATE.periods.length-1;
  showAddForm=false; pushState(); render(); fetchMultChartData();
}
function toggleMultLine(which){
  if(which==='adj')showAdjLine=!showAdjLine; else showCreditLine=!showCreditLine;
  if(!showAdjLine&&!showCreditLine){if(which==='adj')showCreditLine=true;else showAdjLine=true;}
  render(); renderMultChart();
}
function copyUrl(){
  navigator.clipboard.writeText(location.origin+location.pathname+"#"+encodeState()).then(()=>{copiedShow=true;render();setTimeout(()=>{copiedShow=false;render();},2000);});
}

// ── Password Gate ──
const PW_HASH = "7753191e5cc82aab57e875e0b1a1398a"; // md5 of "Amwins"
function simpleHash(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}return h.toString(16);}
// Simple check — not crypto-grade, just a gate
function checkPw(){
  const input=document.getElementById("pwInput").value;
  if(input==="Amwins"){
    sessionStorage.setItem("ryan-auth","1");
    document.getElementById("pwGate").style.display="none";
    document.getElementById("app").style.display="block";
    initApp();
  } else {
    document.getElementById("pwError").style.display="block";
    document.getElementById("pwInput").value="";
    document.getElementById("pwInput").focus();
  }
}

function initApp(){
  loadState();
  render();
  fetchPrice();
  fetchChartData("1y");
  fetchMultChartData();
  setInterval(fetchPrice,300000);
}

// ── Init ──
if(sessionStorage.getItem("ryan-auth")==="1"){
  document.getElementById("pwGate").style.display="none";
  document.getElementById("app").style.display="block";
  initApp();
} else {
  document.getElementById("pwInput").focus();
}
</script>
