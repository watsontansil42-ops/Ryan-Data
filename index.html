<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RYAN Specialty — Valuation Dashboard</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,300;6..12,400;6..12,500;6..12,600;6..12,700;6..12,800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
  :root {
    --bg: #f0f2f5;
    --card: #ffffff;
    --card-border: #e2e6ec;
    --card-shadow: 0 1px 3px rgba(0,43,73,0.06), 0 1px 2px rgba(0,43,73,0.04);
    --surface: #f7f8fa;
    --text: #3a4a5c;
    --text-dim: #8895a7;
    --bold: #1a2a3a;
    --navy: #002B49;
    --navy-light: #003d66;
    --navy-dim: rgba(0,43,73,0.08);
    --navy-border: rgba(0,43,73,0.15);
    --teal: #0097a7;
    --teal-dim: rgba(0,151,167,0.1);
    --green: #2e9e5a;
    --green-dim: rgba(46,158,90,0.1);
    --red: #d64045;
    --red-dim: rgba(214,64,69,0.08);
    --amber: #e4930a;
    --purple: #6a5acd;
    --purple-dim: rgba(106,90,205,0.1);
    --input-bg: #f7f8fa;
    --input-border: #dde1e8;
    --font: 'Nunito Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --mono: 'DM Mono', 'SF Mono', 'Menlo', monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 14px; -webkit-font-smoothing: antialiased; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }
  .wrap { max-width: 900px; margin: 0 auto; padding: 28px 24px 48px; }

  /* Header */
  .header { display: flex; justify-content: space-between; align-items: flex-end; padding-bottom: 20px; margin-bottom: 22px; border-bottom: 2px solid var(--navy); flex-wrap: wrap; gap: 14px; }
  .ticker { font-family: var(--font); font-size: 1.9rem; font-weight: 800; color: var(--navy); letter-spacing: 1px; line-height: 1; }
  .co-name { font-size: 0.82rem; color: var(--text-dim); margin-top: 4px; font-weight: 500; }
  .price-box { text-align: right; }
  .price-tag { font-size: 0.68rem; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 2px; font-weight: 600; }
  .price-val { font-family: var(--mono); font-size: 2rem; font-weight: 500; color: var(--navy); line-height: 1.1; }
  .price-val.stale { color: var(--amber); }
  .price-change { font-family: var(--mono); font-size: 0.78rem; margin-top: 3px; font-weight: 500; }
  .price-change.up { color: var(--green); } .price-change.down { color: var(--red); }
  .price-ts { font-size: 0.68rem; color: var(--text-dim); margin-top: 2px; }
  .status-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 5px; position: relative; top: -1px; }
  .status-dot.live { background: var(--green); box-shadow: 0 0 6px rgba(46,158,90,0.5); }
  .status-dot.off { background: var(--text-dim); }

  /* Controls */
  .controls { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
  .toggle-group { display: flex; background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 8px; overflow: hidden; }
  .toggle-btn { background: none; border: none; color: var(--text-dim); font-family: var(--font); font-size: 0.78rem; font-weight: 600; padding: 7px 16px; cursor: pointer; transition: all 0.15s; }
  .toggle-btn.active { background: var(--navy); color: #fff; }
  .manual-wrap { display: flex; align-items: center; background: var(--card); border: 1px solid var(--input-border); border-radius: 8px; padding: 0 12px; }
  .manual-wrap span { color: var(--text-dim); font-size: 0.85rem; font-weight: 600; }
  .manual-wrap input { background: none; border: none; color: var(--bold); font-family: var(--mono); font-size: 0.85rem; padding: 7px 4px; width: 80px; outline: none; }
  .btn-sm { background: var(--card); border: 1px solid var(--input-border); color: var(--text-dim); font-family: var(--font); font-size: 0.75rem; font-weight: 600; padding: 6px 14px; border-radius: 8px; cursor: pointer; transition: all 0.15s; }
  .btn-sm:hover { border-color: var(--navy); color: var(--navy); }
  .btn-accent { background: var(--navy); border: none; color: #fff; font-family: var(--font); font-size: 0.78rem; font-weight: 700; padding: 8px 18px; border-radius: 8px; cursor: pointer; transition: background 0.15s; }
  .btn-accent:hover { background: var(--navy-light); }
  .warning { font-size: 0.75rem; color: var(--amber); font-weight: 600; }

  /* Card */
  .card { background: var(--card); border: 1px solid var(--card-border); border-radius: 12px; box-shadow: var(--card-shadow); overflow: hidden; margin-bottom: 18px; }
  .card-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 22px; border-bottom: 1px solid var(--card-border); flex-wrap: wrap; gap: 8px; }
  .card-title { font-weight: 700; color: var(--navy); font-size: 0.95rem; }
  .card-period { color: var(--teal); font-weight: 600; font-size: 0.82rem; }
  .card-actions { display: flex; gap: 6px; }
  .btn-edit { background: var(--navy-dim); border: none; color: var(--navy); font-family: var(--font); font-size: 0.75rem; font-weight: 600; padding: 5px 12px; border-radius: 6px; cursor: pointer; }
  .btn-del { background: var(--red-dim); border: none; color: var(--red); font-family: var(--font); font-size: 0.75rem; font-weight: 600; padding: 5px 12px; border-radius: 6px; cursor: pointer; }

  /* Tabs */
  .period-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
  .tabs { display: flex; gap: 6px; flex-wrap: wrap; }
  .tab { background: var(--card); border: 1px solid var(--input-border); color: var(--text-dim); font-family: var(--font); font-size: 0.75rem; font-weight: 600; padding: 6px 14px; border-radius: 8px; cursor: pointer; transition: all 0.15s; }
  .tab.active { background: var(--navy); color: #fff; border-color: var(--navy); }
  .tab-add { border-style: dashed; border-color: var(--navy-border); color: var(--navy); }

  /* Table */
  table { width: 100%; border-collapse: collapse; }
  .row td { padding: 8px 22px; font-size: 0.85rem; border-bottom: 1px solid var(--card-border); }
  .row td:first-child { font-weight: 500; }
  .row td:last-child { text-align: right; font-family: var(--mono); font-size: 0.84rem; }
  .row.indent td:first-child { padding-left: 42px; color: var(--text-dim); }
  .row.bold td { font-weight: 700; color: var(--bold); }
  .row.accent td { color: var(--navy); font-weight: 700; }
  .row.large td { font-size: 0.95rem; }
  .row.spacer td { height: 8px; border: none; }
  .row input[type="number"] { background: var(--input-bg); border: 1px solid var(--navy-border); color: var(--bold); font-family: var(--mono); font-size: 0.84rem; padding: 4px 8px; border-radius: 6px; width: 100px; text-align: right; outline: none; }

  /* Multiples */
  .multiples { display: flex; border-top: 1px solid var(--card-border); }
  .mult-card { flex: 1; padding: 20px 22px; text-align: center; }
  .mult-card + .mult-card { border-left: 1px solid var(--card-border); }
  .mult-label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; margin-bottom: 6px; }
  .mult-val { font-family: var(--mono); font-size: 1.7rem; font-weight: 500; color: var(--navy); }
  .mult-formula { font-size: 0.68rem; color: var(--text-dim); margin-top: 4px; font-weight: 500; }

  /* Comparison */
  .comp-scroll { overflow-x: auto; }
  .comp-table { width: 100%; border-collapse: collapse; }
  .comp-table th { padding: 10px 16px; text-align: right; color: var(--navy); font-size: 0.75rem; font-weight: 700; border-bottom: 1px solid var(--card-border); }
  .comp-table th:first-child { text-align: left; }
  .comp-table td { padding: 8px 16px; font-family: var(--mono); font-size: 0.8rem; text-align: right; border-bottom: 1px solid var(--card-border); }
  .comp-table td:first-child { text-align: left; color: var(--text-dim); font-family: var(--font); font-weight: 600; white-space: nowrap; }

  /* Form */
  .form-card { background: var(--card); border: 1px solid var(--navy-border); border-radius: 12px; padding: 22px; margin-bottom: 18px; box-shadow: var(--card-shadow); }
  .form-title { font-weight: 700; color: var(--navy); font-size: 0.95rem; margin-bottom: 16px; }
  .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-bottom: 16px; }
  .form-field label { display: block; font-size: 0.7rem; color: var(--text-dim); font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 4px; }
  .form-field input { width: 100%; background: var(--input-bg); border: 1px solid var(--input-border); color: var(--bold); font-family: var(--font); font-size: 0.85rem; padding: 8px 12px; border-radius: 8px; outline: none; }
  .form-field input:focus { border-color: var(--navy); box-shadow: 0 0 0 3px var(--navy-dim); }
  .form-actions { display: flex; gap: 10px; }
  .btn-cancel { background: none; border: 1px solid var(--input-border); color: var(--text-dim); font-family: var(--font); font-size: 0.78rem; font-weight: 600; padding: 8px 18px; border-radius: 8px; cursor: pointer; }

  /* Share Bar */
  .share-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; padding: 12px 18px; background: var(--card); border: 1px solid var(--card-border); border-radius: 12px; box-shadow: var(--card-shadow); flex-wrap: wrap; }
  .share-bar .label { font-size: 0.78rem; color: var(--text-dim); font-weight: 600; white-space: nowrap; }
  .share-url { flex: 1; min-width: 180px; background: var(--input-bg); border: 1px solid var(--input-border); color: var(--text); font-family: var(--mono); font-size: 0.72rem; padding: 7px 12px; border-radius: 6px; outline: none; }
  .copied-toast { font-size: 0.78rem; color: var(--green); font-weight: 700; opacity: 0; transition: opacity 0.3s; }
  .copied-toast.show { opacity: 1; }

  /* Charts */
  .chart-filters { display: flex; gap: 4px; flex-wrap: wrap; }
  .chart-filter-btn { background: var(--input-bg); border: 1px solid var(--input-border); color: var(--text-dim); font-family: var(--font); font-size: 0.72rem; font-weight: 600; padding: 5px 11px; border-radius: 6px; cursor: pointer; transition: all 0.15s; }
  .chart-filter-btn.active { background: var(--navy); color: #fff; border-color: var(--navy); }
  .chart-filter-btn.active-blue { background: var(--navy-dim); color: var(--navy); border-color: var(--navy-border); }
  .chart-filter-btn.active-purple { background: var(--purple-dim); color: var(--purple); border-color: rgba(106,90,205,0.25); }
  .chart-filter-btn:hover { border-color: var(--navy-border); color: var(--navy); }
  .chart-wrap { padding: 18px 22px 22px; }
  .chart-container { position: relative; height: 320px; }
  .chart-loading { display: flex; align-items: center; justify-content: center; height: 320px; color: var(--text-dim); font-size: 0.85rem; font-weight: 600; }
  .mult-toggles { display: flex; gap: 5px; }

  /* Password Gate */
  .pw-gate { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg); }
  .pw-box { background: var(--card); border: 1px solid var(--card-border); border-radius: 16px; box-shadow: 0 4px 24px rgba(0,43,73,0.08); padding: 48px 40px; text-align: center; width: 360px; max-width: 90vw; }
  .pw-ticker { font-size: 1.5rem; font-weight: 800; color: var(--navy); letter-spacing: 1px; margin-bottom: 4px; }
  .pw-sub { font-size: 0.85rem; color: var(--text-dim); margin-bottom: 28px; font-weight: 500; }
  .pw-input { width: 100%; background: var(--input-bg); border: 1px solid var(--input-border); color: var(--bold); font-family: var(--font); font-size: 0.95rem; padding: 12px 16px; border-radius: 10px; outline: none; text-align: center; margin-bottom: 14px; }
  .pw-input:focus { border-color: var(--navy); box-shadow: 0 0 0 3px var(--navy-dim); }
  .pw-btn { width: 100%; background: var(--navy); border: none; color: #fff; font-family: var(--font); font-size: 0.88rem; font-weight: 700; padding: 12px; border-radius: 10px; cursor: pointer; transition: background 0.15s; }
  .pw-btn:hover { background: var(--navy-light); }
  .pw-error { color: var(--red); font-size: 0.8rem; font-weight: 600; margin-top: 12px; }

  .footer { text-align: center; color: var(--text-dim); font-size: 0.72rem; font-weight: 500; padding: 20px 0; }

  @media (max-width: 600px) {
    .wrap { padding: 16px 14px 36px; }
    .ticker { font-size: 1.4rem; } .price-val { font-size: 1.5rem; }
    .mult-val { font-size: 1.3rem; } .multiples { flex-direction: column; }
    .mult-card + .mult-card { border-left: none; border-top: 1px solid var(--card-border); }
    .chart-container { height: 240px; }
  }
</style>
</head>
<body>
<div id="pwGate" class="pw-gate">
  <div class="pw-box">
    <div class="pw-ticker">RYAN</div>
    <div class="pw-sub">Valuation Dashboard</div>
    <input class="pw-input" id="pwInput" type="password" placeholder="Enter password" onkeydown="if(event.key==='Enter')checkPw()">
    <button class="pw-btn" onclick="checkPw()">Access Dashboard</button>
    <div class="pw-error" id="pwError" style="display:none">Incorrect password</div>
  </div>
</div>
<div class="wrap" id="app" style="display:none"></div>

<script>
const DEFAULT_PERIODS = [
  { id:"ltm-mar25", label:"LTM Mar-25", effectiveDate:"2025-05-01", ebitda:665.2, changeContingent:-36.8, totalAdjustments:226.1, creditAdjustments:77.9, sharesOutstanding:262, cash:213, totalDebt:3689 },
  { id:"ltm-jun25", label:"LTM Jun-25", effectiveDate:"2025-07-31", ebitda:733.2, changeContingent:-38.9, totalAdjustments:220.9, creditAdjustments:41.0, sharesOutstanding:262, cash:0, totalDebt:3299 },
  { id:"ltm-sep25", label:"LTM Sep-25", effectiveDate:"2025-10-30", ebitda:812.4, changeContingent:-26.5, totalAdjustments:174.6, creditAdjustments:26.0, sharesOutstanding:264, cash:157, totalDebt:3392 },
  { id:"ltm-dec25", label:"LTM Dec-25", effectiveDate:"2026-02-12", ebitda:803.1, changeContingent:13.1, totalAdjustments:150.5, creditAdjustments:35.5, sharesOutstanding:264, cash:158, totalDebt:3352 },
];
let STATE={periods:[...DEFAULT_PERIODS],activePeriodIdx:3,manualPrice:null,useManualPrice:false};
let livePrice=null,prevClose=null,priceLoading=true,priceError=false,lastFetch=null;
let editing=false,showAddForm=false,copiedShow=false;
let priceChart=null,multChart=null,chartRange="1y",chartLoading=false,chartData=[];
let multChartLoading=false,multChartData=[],showAdjLine=true,showCreditLine=true;

const CHART_RANGES=[
  {key:"1w",label:"1W",range:"5d",interval:"15m"},{key:"1m",label:"1M",range:"1mo",interval:"1d"},
  {key:"3m",label:"3M",range:"3mo",interval:"1d"},{key:"ytd",label:"YTD",range:"ytd",interval:"1d"},
  {key:"1y",label:"1Y",range:"1y",interval:"1d"},{key:"5y",label:"5Y",range:"5y",interval:"1wk"},
  {key:"ipo",label:"Since IPO",range:"max",interval:"1wk"},
];

const fmt=(n,d=1)=>n==null||isNaN(n)?"—":n.toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtM=n=>"$"+fmt(n); const fmtX=n=>fmt(n,1)+"x";

function calcDerived(p,price){
  const ebitdac=(p.ebitda||0)+(p.changeContingent||0);
  const adjEbitdac=ebitdac+(p.totalAdjustments||0);
  const pfAdjEbitdac=adjEbitdac+(p.creditAdjustments||0);
  const equityValue=(p.sharesOutstanding||0)*(price||0);
  const netDebt=(p.totalDebt||0)-(p.cash||0);
  const ev=equityValue+netDebt;
  const adjMultiple=adjEbitdac>0?ev/adjEbitdac:null;
  const creditMultiple=pfAdjEbitdac>0?ev/pfAdjEbitdac:null;
  return{ebitdac,adjEbitdac,pfAdjEbitdac,equityValue,netDebt,ev,adjMultiple,creditMultiple};
}
function getActivePeriodForDate(dateMs){
  const sorted=[...STATE.periods].filter(p=>p.effectiveDate).sort((a,b)=>new Date(a.effectiveDate)-new Date(b.effectiveDate));
  let active=sorted[0];
  for(const p of sorted){if(new Date(p.effectiveDate).getTime()<=dateMs)active=p;else break;}
  return active;
}

function encodeState(){try{return btoa(unescape(encodeURIComponent(JSON.stringify({p:STATE.periods,mp:STATE.manualPrice,um:STATE.useManualPrice}))));}catch{return "";}}
function decodeState(h){try{const j=decodeURIComponent(escape(atob(h)));const d=JSON.parse(j);if(d.p&&Array.isArray(d.p)){STATE.periods=d.p;STATE.manualPrice=d.mp||null;STATE.useManualPrice=!!d.um;}}catch{}}
function pushState(){history.replaceState(null,"","#"+encodeState());try{localStorage.setItem("ryan-val-v5",JSON.stringify(STATE));}catch{}}
function loadState(){const h=location.hash.slice(1);if(h){decodeState(h);}else{try{const s=localStorage.getItem("ryan-val-v5");if(s){const d=JSON.parse(s);if(d.periods)STATE={...STATE,...d};}}catch{}}}

async function fetchPrice(){
  priceLoading=true;render();
  try{const r=await fetch("/.netlify/functions/price?symbol=RYAN");const d=await r.json();if(d.price&&!isNaN(d.price)){livePrice=d.price;prevClose=d.prevClose||null;priceError=false;lastFetch=new Date();}else throw new Error("no price");}
  catch(e){console.error(e);priceError=true;}
  priceLoading=false;render();
}
async function fetchChartData(rk){
  chartRange=rk;chartLoading=true;render();
  const cfg=CHART_RANGES.find(r=>r.key===rk);
  try{const r=await fetch(`/.netlify/functions/price?symbol=RYAN&range=${cfg.range}&interval=${cfg.interval}`);const d=await r.json();if(d.chart&&d.chart.length>0)chartData=d.chart;}catch(e){console.error(e);}
  chartLoading=false;render();renderPriceChart();
}
async function fetchMultChartData(){
  multChartLoading=true;render();
  try{const r=await fetch("/.netlify/functions/price?symbol=RYAN&range=1y&interval=1d");const d=await r.json();if(d.chart&&d.chart.length>0)multChartData=d.chart;}catch(e){console.error(e);}
  multChartLoading=false;render();renderMultChart();
}
function getActivePrice(){if(STATE.useManualPrice&&STATE.manualPrice!=null)return STATE.manualPrice;return livePrice||STATE.manualPrice||41.30;}

function renderPriceChart(){
  const canvas=document.getElementById("priceChartCanvas");if(!canvas||chartData.length===0)return;
  if(priceChart){priceChart.destroy();priceChart=null;}
  const ctx=canvas.getContext("2d");
  const grad=ctx.createLinearGradient(0,0,0,canvas.parentElement.clientHeight);
  const first=chartData[0].c,last=chartData[chartData.length-1].c,isUp=last>=first;
  grad.addColorStop(0,isUp?"rgba(46,158,90,0.15)":"rgba(214,64,69,0.12)");
  grad.addColorStop(1,"rgba(255,255,255,0)");
  priceChart=new Chart(ctx,{type:"line",
    data:{labels:chartData.map(d=>new Date(d.t)),datasets:[{data:chartData.map(d=>d.c),borderColor:isUp?"#2e9e5a":"#d64045",borderWidth:2,backgroundColor:grad,fill:true,pointRadius:0,pointHitRadius:8,tension:0.15}]},
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:"index",intersect:false},
      plugins:{legend:{display:false},tooltip:{backgroundColor:"#fff",titleColor:"#3a4a5c",bodyColor:"#002B49",titleFont:{family:"'Nunito Sans'",size:11,weight:"600"},bodyFont:{family:"'DM Mono'",size:13,weight:"500"},borderColor:"#e2e6ec",borderWidth:1,padding:12,displayColors:false,
        callbacks:{title(i){return new Date(i[0].parsed.x).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});},label(i){return "$"+i.parsed.y.toFixed(2);}}}},
      scales:{x:{type:"time",grid:{color:"rgba(0,43,73,0.05)",drawBorder:false},ticks:{color:"#8895a7",font:{family:"'Nunito Sans'",size:10,weight:"600"},maxTicksLimit:8},border:{display:false}},
        y:{position:"right",grid:{color:"rgba(0,43,73,0.05)",drawBorder:false},ticks:{color:"#8895a7",font:{family:"'DM Mono'",size:10},callback(v){return "$"+v.toFixed(0);}},border:{display:false}}}}
  });
}

function renderMultChart(){
  const canvas=document.getElementById("multChartCanvas");if(!canvas||multChartData.length===0)return;
  if(multChart){multChart.destroy();multChart=null;}
  const ctx=canvas.getContext("2d");
  const adjPts=[],creditPts=[],metaArr=[];
  for(const pt of multChartData){
    const per=getActivePeriodForDate(pt.t);if(!per)continue;
    const d=calcDerived(per,pt.c);
    adjPts.push({x:new Date(pt.t),y:d.adjMultiple?Math.round(d.adjMultiple*10)/10:null});
    creditPts.push({x:new Date(pt.t),y:d.creditMultiple?Math.round(d.creditMultiple*10)/10:null});
    metaArr.push({price:pt.c,ev:d.ev,adjEbitdac:d.adjEbitdac,pfAdjEbitdac:d.pfAdjEbitdac,period:per.label});
  }
  const datasets=[];
  if(showAdjLine)datasets.push({label:"Adj. EBITDAC Multiple",data:adjPts,borderColor:"#002B49",borderWidth:2.5,fill:false,pointRadius:0,pointHitRadius:8,tension:0.15});
  if(showCreditLine)datasets.push({label:"Credit Adj. Multiple",data:creditPts,borderColor:"#6a5acd",borderWidth:2,fill:false,pointRadius:0,pointHitRadius:8,tension:0.15,borderDash:[5,3]});

  const periodLines=STATE.periods.filter(p=>p.effectiveDate).map(p=>({date:new Date(p.effectiveDate),label:p.label}));
  const plPlugin={id:'pl',afterDraw(chart){const xs=chart.scales.x,ys=chart.scales.y,c=chart.ctx;c.save();
    for(const pl of periodLines){const x=xs.getPixelForValue(pl.date);if(x>=xs.left&&x<=xs.right){c.beginPath();c.setLineDash([4,4]);c.strokeStyle="rgba(0,43,73,0.2)";c.lineWidth=1;c.moveTo(x,ys.top);c.lineTo(x,ys.bottom);c.stroke();c.setLineDash([]);c.font="600 10px 'Nunito Sans'";c.fillStyle="#8895a7";c.textAlign="center";c.fillText(pl.label,x,ys.top-8);}}c.restore();}};

  multChart=new Chart(ctx,{type:"line",data:{datasets},plugins:[plPlugin],
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:"index",intersect:false},
      plugins:{legend:{display:false},
        tooltip:{backgroundColor:"#fff",titleColor:"#3a4a5c",bodyColor:"#002B49",titleFont:{family:"'Nunito Sans'",size:11,weight:"600"},bodyFont:{family:"'DM Mono'",size:11,weight:"500"},borderColor:"#e2e6ec",borderWidth:1,padding:12,displayColors:true,boxWidth:8,boxHeight:2,
          callbacks:{
            title(items){const idx=items[0].dataIndex;return new Date(multChartData[idx]?.t).toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric",year:"numeric"});},
            afterTitle(items){const m=metaArr[items[0].dataIndex];return m?"Period: "+m.period:"";},
            beforeBody(items){const m=metaArr[items[0].dataIndex];if(!m)return[];return["Share Price: $"+m.price.toFixed(2),"Enterprise Value: $"+Math.round(m.ev).toLocaleString(),"Adj. EBITDAC: $"+m.adjEbitdac.toFixed(1),"PF Adj. EBITDAC: $"+m.pfAdjEbitdac.toFixed(1)];},
            label(item){return " "+item.dataset.label+": "+item.parsed.y.toFixed(1)+"x";}}}},
      scales:{x:{type:"time",grid:{color:"rgba(0,43,73,0.05)",drawBorder:false},ticks:{color:"#8895a7",font:{family:"'Nunito Sans'",size:10,weight:"600"},maxTicksLimit:8},border:{display:false}},
        y:{position:"right",grid:{color:"rgba(0,43,73,0.05)",drawBorder:false},ticks:{color:"#8895a7",font:{family:"'DM Mono'",size:10},callback(v){return v.toFixed(0)+"x";}},border:{display:false}}}}
  });
}

function render(){
  const ap=STATE.periods[STATE.activePeriodIdx]||STATE.periods[0];
  const price=getActivePrice();const d=ap?calcDerived(ap,price):null;
  const isLive=!STATE.useManualPrice&&livePrice!=null;
  const priceLabel=STATE.useManualPrice?"MANUAL PRICE":priceLoading&&!livePrice?"FETCHING...":priceError&&!livePrice?"MANUAL FALLBACK":"LIVE PRICE";
  const priceClass=isLive?"":"stale";
  let changeHtml="";
  if(isLive&&prevClose&&livePrice){const chg=livePrice-prevClose,pct=(chg/prevClose)*100,dir=chg>=0?"up":"down",sign=chg>=0?"+":"";changeHtml=`<div class="price-change ${dir}">${sign}${chg.toFixed(2)} (${sign}${pct.toFixed(2)}%)</div>`;}

  let html=`
    <div class="header"><div><div class="ticker">RYAN</div><div class="co-name">Ryan Specialty Holdings, Inc.</div></div>
      <div class="price-box"><div class="price-tag"><span class="status-dot ${isLive?'live':'off'}"></span>${priceLabel}</div><div class="price-val ${priceClass}">$${fmt(price,2)}</div>${changeHtml}${lastFetch&&!STATE.useManualPrice?`<div class="price-ts">Updated ${lastFetch.toLocaleTimeString()}</div>`:""}</div></div>

    <div class="card"><div class="card-head"><span class="card-title">Daily Multiple Tracker</span>
      <div class="mult-toggles"><button class="chart-filter-btn ${showAdjLine?'active-blue':''}" onclick="toggleMultLine('adj')">Adj. EBITDAC</button><button class="chart-filter-btn ${showCreditLine?'active-purple':''}" onclick="toggleMultLine('credit')">PF Adj. EBITDAC</button></div></div>
      <div class="chart-wrap">${multChartLoading?'<div class="chart-loading">Loading multiple data...</div>':`<div class="chart-container"><canvas id="multChartCanvas"></canvas></div>`}</div></div>

    <div class="card"><div class="card-head"><span class="card-title">Share Price</span>
      <div class="chart-filters">${CHART_RANGES.map(r=>`<button class="chart-filter-btn ${chartRange===r.key?'active':''}" onclick="fetchChartData('${r.key}')">${r.label}</button>`).join("")}</div></div>
      <div class="chart-wrap">${chartLoading?'<div class="chart-loading">Loading chart data...</div>':`<div class="chart-container"><canvas id="priceChartCanvas"></canvas></div>`}</div></div>

    <div class="share-bar"><span class="label">Share with team →</span><input class="share-url" readonly value="${location.origin+location.pathname+'#'+encodeState()}" onclick="this.select()"><button class="btn-sm" onclick="copyUrl()">Copy Link</button><span class="copied-toast ${copiedShow?'show':''}">Copied!</span></div>

    <div class="controls"><div class="toggle-group"><button class="toggle-btn ${!STATE.useManualPrice?'active':''}" onclick="setManualMode(false)">Live Price</button><button class="toggle-btn ${STATE.useManualPrice?'active':''}" onclick="setManualMode(true)">Manual</button></div>
      ${STATE.useManualPrice||(priceError&&!livePrice)?`<div class="manual-wrap"><span>$</span><input type="number" step="0.01" value="${STATE.manualPrice||''}" placeholder="Price" oninput="updateManualPrice(this.value)"></div>`:""}
      ${!STATE.useManualPrice?`<button class="btn-sm" onclick="fetchPrice()">↻ Refresh</button>`:""}
      ${priceError&&!STATE.useManualPrice&&!livePrice?`<span class="warning">Live unavailable — enter manually</span>`:""}</div>

    <div class="period-bar"><div class="tabs">${STATE.periods.map((p,i)=>`<button class="tab ${i===STATE.activePeriodIdx?'active':''}" onclick="selectPeriod(${i})">${p.label}</button>`).join("")}</div><button class="tab tab-add" onclick="toggleAddForm()">+ Add Period</button></div>`;

  if(showAddForm){html+=`<div class="form-card"><div class="form-title">Add New Period ($ in millions)</div><div class="form-grid">
    <div class="form-field"><label>Period Label</label><input id="f_label" placeholder="e.g. LTM Mar-26"></div><div class="form-field"><label>Effective Date</label><input id="f_date" type="date"></div>
    <div class="form-field"><label>EBITDA</label><input id="f_ebitda" type="number" step="0.1"></div><div class="form-field"><label>Δ Contingent Consideration</label><input id="f_cc" type="number" step="0.1"></div>
    <div class="form-field"><label>Total Adjustments</label><input id="f_adj" type="number" step="0.1"></div><div class="form-field"><label>Credit Adjustments</label><input id="f_cred" type="number" step="0.1"></div>
    <div class="form-field"><label>Shares Outstanding</label><input id="f_shares" type="number" step="0.1"></div><div class="form-field"><label>Cash</label><input id="f_cash" type="number" step="0.1"></div>
    <div class="form-field"><label>LT + ST Debt</label><input id="f_debt" type="number" step="0.1"></div></div>
    <div class="form-actions"><button class="btn-accent" onclick="addPeriod()">Add Period</button><button class="btn-cancel" onclick="toggleAddForm()">Cancel</button></div></div>`;}

  if(ap&&d){const ef=editing;
    const mkRow=(label,val,opts={})=>{const cls=["row"];if(opts.indent)cls.push("indent");if(opts.bold)cls.push("bold");if(opts.accent)cls.push("accent");if(opts.large)cls.push("large");if(opts.spacer)return'<tr class="row spacer"><td colspan="2"></td></tr>';const cell=ef&&opts.field?`<input type="number" step="0.1" value="${ap[opts.field]||''}" oninput="updateField('${opts.field}',this.value)">`:val;return`<tr class="${cls.join(' ')}"><td>${label}</td><td>${cell}</td></tr>`;};
    html+=`<div class="card"><div class="card-head"><span class="card-title">Valuation Summary</span><span class="card-period">${ap.label}</span><div class="card-actions"><button class="btn-edit" onclick="toggleEdit()">${editing?'Done':'Edit'}</button>${STATE.periods.length>1?'<button class="btn-del" onclick="deletePeriod()">Delete</button>':""}</div></div><table>
      ${mkRow("EBITDA",fmtM(ap.ebitda),{field:"ebitda"})}${mkRow("(+) Change in Contingent Consideration",fmtM(ap.changeContingent),{indent:true,field:"changeContingent"})}${mkRow("EBITDAC",fmtM(d.ebitdac),{bold:true})}
      ${mkRow("Total Adjustments",fmtM(ap.totalAdjustments),{indent:true,field:"totalAdjustments"})}${mkRow("Adjusted EBITDAC",fmtM(d.adjEbitdac),{bold:true,accent:true})}
      ${mkRow("(+) Credit Adjustments",fmtM(ap.creditAdjustments),{indent:true,field:"creditAdjustments"})}${mkRow("PF Adjusted EBITDAC",fmtM(d.pfAdjEbitdac),{bold:true,accent:true})}${mkRow("","",{spacer:true})}
      ${mkRow("Total Shares Outstanding",fmt(ap.sharesOutstanding,0),{field:"sharesOutstanding"})}${mkRow("Share Price ("+(STATE.useManualPrice?"Manual":"Live")+")","$"+fmt(price,2))}${mkRow("Equity Value",fmtM(d.equityValue),{bold:true})}${mkRow("","",{spacer:true})}
      ${mkRow("Cash",fmtM(ap.cash),{indent:true,field:"cash"})}${mkRow("Long Term Debt + ST Debt",fmtM(ap.totalDebt),{indent:true,field:"totalDebt"})}${mkRow("Net Debt",fmtM(d.netDebt),{bold:true})}${mkRow("","",{spacer:true})}
      ${mkRow("Enterprise Value",fmtM(d.ev),{bold:true,accent:true,large:true})}</table>
      <div class="multiples"><div class="mult-card"><div class="mult-label">Adj. EBITDAC Multiple</div><div class="mult-val">${d.adjMultiple?fmtX(d.adjMultiple):"—"}</div><div class="mult-formula">EV / Adj. EBITDAC</div></div>
      <div class="mult-card"><div class="mult-label">Credit Adj. EBITDAC Multiple</div><div class="mult-val">${d.creditMultiple?fmtX(d.creditMultiple):"—"}</div><div class="mult-formula">EV / PF Adj. EBITDAC</div></div></div></div>`;}

  if(STATE.periods.length>1){
    const metrics=[{label:"Adj. EBITDAC",fn:p=>calcDerived(p,price).adjEbitdac},{label:"PF Adj. EBITDAC",fn:p=>calcDerived(p,price).pfAdjEbitdac},{label:"Net Debt",fn:p=>calcDerived(p,price).netDebt},{label:"Enterprise Value",fn:p=>calcDerived(p,price).ev},{label:"Adj. Multiple",fn:p=>calcDerived(p,price).adjMultiple,isX:true},{label:"Credit Adj. Multiple",fn:p=>calcDerived(p,price).creditMultiple,isX:true}];
    html+=`<div class="card"><div class="card-head"><span class="card-title">Period Comparison</span></div><div class="comp-scroll"><table class="comp-table"><thead><tr><th></th>${STATE.periods.map(p=>`<th>${p.label}</th>`).join("")}</tr></thead><tbody>
      ${metrics.map(m=>`<tr><td>${m.label}</td>${STATE.periods.map(p=>{const v=m.fn(p);return`<td>${m.isX?(v?fmtX(v):"—"):fmtM(v)}</td>`;}).join("")}</tr>`).join("")}</tbody></table></div></div>`;}

  html+='<div class="footer">Amounts in millions unless noted · Share the URL to sync data across your team · Auto-refreshes every 5 min</div>';
  document.getElementById("app").innerHTML=html;
  if(!chartLoading&&chartData.length>0)setTimeout(renderPriceChart,10);
  if(!multChartLoading&&multChartData.length>0)setTimeout(renderMultChart,10);
}

function setManualMode(m){STATE.useManualPrice=m;pushState();render();}
function updateManualPrice(v){STATE.manualPrice=parseFloat(v)||null;pushState();render();}
function selectPeriod(i){STATE.activePeriodIdx=i;render();}
function toggleEdit(){editing=!editing;render();}
function toggleAddForm(){showAddForm=!showAddForm;render();}
function updateField(field,val){STATE.periods[STATE.activePeriodIdx][field]=parseFloat(val)||0;pushState();render();}
function deletePeriod(){if(STATE.periods.length<=1)return;STATE.periods.splice(STATE.activePeriodIdx,1);STATE.activePeriodIdx=0;pushState();render();}
function addPeriod(){const label=document.getElementById("f_label")?.value?.trim();if(!label)return;STATE.periods.push({id:label.toLowerCase().replace(/\s+/g,"-")+"-"+Date.now(),label,effectiveDate:document.getElementById("f_date")?.value||"",ebitda:parseFloat(document.getElementById("f_ebitda")?.value)||0,changeContingent:parseFloat(document.getElementById("f_cc")?.value)||0,totalAdjustments:parseFloat(document.getElementById("f_adj")?.value)||0,creditAdjustments:parseFloat(document.getElementById("f_cred")?.value)||0,sharesOutstanding:parseFloat(document.getElementById("f_shares")?.value)||0,cash:parseFloat(document.getElementById("f_cash")?.value)||0,totalDebt:parseFloat(document.getElementById("f_debt")?.value)||0});STATE.activePeriodIdx=STATE.periods.length-1;showAddForm=false;pushState();render();fetchMultChartData();}
function toggleMultLine(which){if(which==='adj')showAdjLine=!showAdjLine;else showCreditLine=!showCreditLine;if(!showAdjLine&&!showCreditLine){if(which==='adj')showCreditLine=true;else showAdjLine=true;}render();renderMultChart();}
function copyUrl(){navigator.clipboard.writeText(location.origin+location.pathname+"#"+encodeState()).then(()=>{copiedShow=true;render();setTimeout(()=>{copiedShow=false;render();},2000);});}

function checkPw(){const input=document.getElementById("pwInput").value;if(input==="Amwins"){sessionStorage.setItem("ryan-auth","1");document.getElementById("pwGate").style.display="none";document.getElementById("app").style.display="block";initApp();}else{document.getElementById("pwError").style.display="block";document.getElementById("pwInput").value="";document.getElementById("pwInput").focus();}}
function initApp(){loadState();render();fetchPrice();fetchChartData("1y");fetchMultChartData();setInterval(fetchPrice,300000);}
if(sessionStorage.getItem("ryan-auth")==="1"){document.getElementById("pwGate").style.display="none";document.getElementById("app").style.display="block";initApp();}else{document.getElementById("pwInput").focus();}
</script>
</body>
</html>
